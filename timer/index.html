<!doctype html>
<html lang="en" data-bs-theme="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Mark's Countdown Timer</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container py-5">
      <div class="row">
        <div class="col-12 text-center"><h1>Mark's Countdown Timer</h1></div>
      </div>
      <div id="pageContent">
        <div class="row g-3 d-flex justify-content-center" id="formSection">
          <div class="col-2">
            <label for="hoursInput" class="form-label">Hours</label>
            <input
              onKeyUp="setEndTimeValue()"
              type="number"
              class="form-control form-control-lg"
              id="hoursInput"
              value="0"
            /><br />
            <div class="d-grid gap-2">
              <div class="btn-group" role="group" aria-label="Hours Buttons">
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleHourClick(false)"
                >
                  <i class="fa-solid fa-minus"></i>
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleHourClick(true)"
                >
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="col-2">
            <label for="minutesInput" class="form-label">Minutes</label>
            <input
              onKeyUp="setEndTimeValue()"
              type="number"
              class="form-control form-control-lg"
              id="minutesInput"
              value="0"
            /><br />
            <div class="d-grid gap-2">
              <div
                class="btn-group btn-sm"
                role="group"
                aria-label="Minutes Buttons"
              >
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleMinuteClick(false)"
                >
                  <i class="fa-solid fa-minus"></i>
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleMinuteClick(true)"
                >
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>
          </div>
          <div class="col-2">
            <label for="secondsInput" class="form-label">Seconds</label>
            <input
              onKeyUp="setEndTimeValue()"
              type="number"
              class="form-control form-control-lg"
              id="secondsInput"
              value="0"
            /><br />
            <div class="d-grid gap-2">
              <div
                class="btn-group btn-sm"
                role="group"
                aria-label="Second Buttons"
              >
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleSecondClick(false)"
                >
                  <i class="fa-solid fa-minus"></i>
                </button>
                <button
                  type="button"
                  class="btn btn-primary btn-sm"
                  onClick="handleSecondClick(true)"
                >
                  <i class="fa-solid fa-plus"></i>
                </button>
              </div>
            </div>
          </div>
        </div>
        <hr />
        <div class="row g-3 d-flex justify-content-center">
          <div class="col-3">Current time:</div>
          <div class="col-3 h1" id="currentTime"></div>
        </div>
        <div class="row g-3 d-flex justify-content-center">
          <div class="col-3">End time:</div>
          <div class="col-3 h1" id="endTime"></div>
        </div>
        <div class="row g-3 d-flex justify-content-center">
          <div class="col-3">Time remaining:</div>
          <div class="col-3 h1" id="remainingTime"></div>
        </div>
        <hr />
        <div class="row g-3 d-flex justify-content-center">
          <div class="col-3 text-center">
            <button
              id="startBtn"
              type="button"
              class="btn btn-primary btn-lg"
              onClick="startClick()"
            >
              Start
            </button>
          </div>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
      integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
      integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://kit.fontawesome.com/8b41e2246c.js"
      crossorigin="anonymous"
    ></script>
    <script type="text/javascript" src="script.js"></script>
  </body>
</html>
